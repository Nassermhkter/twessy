<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - Healtha</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --bg: #F8FAFC;
            --bg-white: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --danger: #EF4444;
            --success: #27ae60;
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: 0.3s;
            --font: 'Tajawal', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #CCFBF1, #E0F2FE);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
        }

        .login-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: white;
            cursor: pointer;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 700;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-btn:active {
            transform: scale(0.98);
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:active {
            background: var(--primary-dark);
            transform: scale(0.97);
        }

        .btn-google {
            background: white;
            color: #DB4437;
            border: 2px solid #DB4437;
            margin-top: 15px;
        }

        .btn-google:active {
            transform: scale(0.97);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider::before {
            margin-left: 10px;
        }

        .divider::after {
            margin-right: 10px;
        }

        .message {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-top: 15px;
            text-align: center;
            display: none;
            font-weight: 500;
            font-size: 13px;
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
        }

        .message.success {
            background: #D1FAE5;
            color: #065F46;
        }

        .message.info {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 10px;
            color: var(--primary);
        }

        .loading-spinner.show {
            display: block;
        }

        .loading-spinner i {
            animation: spin 1s linear infinite;
            font-size: 24px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🏥 Healtha</h1>
                <p>تسجيل الدخول أو إنشاء حساب جديد</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
            </div>

            <!-- Login Panel -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                    </button>
                </form>

                <div class="divider">أو</div>

                <button class="btn btn-google" onclick="handleGoogleLogin()">
                    <i class="fab fa-google"></i> تسجيل الدخول بحساب Google
                </button>

                <div class="loading-spinner" id="loginLoading">
                    <i class="fas fa-circle-notch"></i> جاري تسجيل الدخول...
                </div>
                <div class="message error" id="loginError"></div>
                <div class="message success" id="loginSuccess"></div>
            </div>

            <!-- Register Panel -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="return false;">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> الاسم الأول</label>
                            <input type="text" id="regFirstName" placeholder="أحمد" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> الاسم الأخير</label>
                            <input type="text" id="regLastName" placeholder="محمد" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" id="regEmail" placeholder="example@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> رقم الجوال</label>
                        <input type="tel" id="regPhone" placeholder="05xxxxxxxx" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-city"></i> المدينة</label>
                            <input type="text" id="regCity" placeholder="الرياض" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-location-dot"></i> الحي</label>
                            <input type="text" id="regDistrict" placeholder="الملز" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> العنوان التفصيلي</label>
                        <textarea id="regAddress" rows="2" placeholder="شارع الملك فهد، مبنى رقم ١٢" required></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> تاريخ الميلاد</label>
                            <input type="date" id="regBirthdate" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-venus-mars"></i> الجنس</label>
                            <select id="regGender" required>
                                <option value="">اختر</option>
                                <option value="male">ذكر</option>
                                <option value="female">أنثى</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> كلمة المرور</label>
                            <input type="password" id="regPassword" placeholder="6 أحرف على الأقل" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-check-circle"></i> تأكيد كلمة المرور</label>
                            <input type="password" id="regConfirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-primary" onclick="handleRegister()">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                </form>

                <div class="divider">أو</div>

                <button class="btn btn-google" onclick="handleGoogleRegister()">
                    <i class="fab fa-google"></i> إنشاء حساب بـ Google
                </button>

                <div class="loading-spinner" id="registerLoading">
                    <i class="fas fa-circle-notch"></i> جاري إنشاء الحساب...
                </div>
                <div class="message error" id="registerError"></div>
                <div class="message success" id="registerSuccess"></div>
            </div>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            databaseURL: "https://medical-54ab4-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Google OAuth User (محاكاة)
        let googleUserData = null;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
            hideAllMessages();
            
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }

        function hideAllMessages() {
            ['loginError', 'loginSuccess', 'registerError', 'registerSuccess'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
            document.getElementById('loginLoading')?.classList.remove('show');
            document.getElementById('registerLoading')?.classList.remove('show');
        }

        function showMessage(id, text) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = text;
                el.style.display = 'block';
            }
        }

        // تسجيل الدخول العادي
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            hideAllMessages();
            
            if (!email || !password) {
                showMessage('loginError', 'يرجى إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            document.getElementById('loginLoading').classList.add('show');

            database.ref('users').orderByChild('email').equalTo(email).once('value')
                .then((snapshot) => {
                    document.getElementById('loginLoading').classList.remove('show');
                    
                    if (snapshot.exists()) {
                        let loggedIn = false;
                        
                        snapshot.forEach((childSnapshot) => {
                            const user = childSnapshot.val();
                            
                            if (user.password === password) {
                                loggedIn = true;
                                
                                const userData = {
                                    id: childSnapshot.key,
                                    email: user.email,
                                    firstName: user.firstName,
                                    lastName: user.lastName,
                                    fullName: `${user.firstName} ${user.lastName}`,
                                    role: user.role || 'customer',
                                    phone: user.phone || '',
                                    city: user.city || '',
                                    district: user.district || '',
                                    address: user.address || '',
                                    birthdate: user.birthdate || '',
                                    gender: user.gender || ''
                                };
                                
                                localStorage.setItem('user', JSON.stringify(userData));
                                showMessage('loginSuccess', '✅ تم تسجيل الدخول بنجاح!');
                                
                                database.ref(`users/${childSnapshot.key}`).update({
                                    lastLogin: Date.now()
                                }).catch(() => {});
                                
                                setTimeout(() => {
                                    if (userData.role === 'admin') {
                                        window.location.href = 'admin.html';
                                    } else {
                                        window.location.href = 'index.html';
                                    }
                                }, 800);
                            }
                        });
                        
                        if (!loggedIn) {
                            showMessage('loginError', '❌ كلمة المرور غير صحيحة');
                        }
                    } else {
                        showMessage('loginError', '❌ البريد الإلكتروني غير مسجل');
                    }
                })
                .catch((error) => {
                    document.getElementById('loginLoading').classList.remove('show');
                    console.error('Firebase error:', error);
                    showMessage('loginError', '❌ خطأ في الاتصال: ' + error.message);
                });
        }

        // تسجيل الدخول بـ Google
        function handleGoogleLogin() {
            hideAllMessages();
            document.getElementById('loginLoading').classList.add('show');
            
            // محاكاة تسجيل الدخول بـ Google
            setTimeout(() => {
                document.getElementById('loginLoading').classList.remove('show');
                
                const googleEmail = prompt('📧 أدخل بريدك الإلكتروني في Google:', 'user@gmail.com');
                if (!googleEmail) return;
                
                const googleName = prompt('👤 أدخل اسمك الكامل:', 'Ahmed Mohammed');
                
                database.ref('users').orderByChild('email').equalTo(googleEmail).once('value')
                    .then((snapshot) => {
                        if (snapshot.exists()) {
                            let userFound = false;
                            snapshot.forEach((childSnapshot) => {
                                const user = childSnapshot.val();
                                if (user.provider === 'google' || user.email === googleEmail) {
                                    userFound = true;
                                    const userData = {
                                        id: childSnapshot.key,
                                        email: user.email,
                                        firstName: user.firstName,
                                        lastName: user.lastName,
                                        fullName: `${user.firstName} ${user.lastName}`,
                                        role: user.role || 'customer',
                                        phone: user.phone || '',
                                        provider: 'google'
                                    };
                                    localStorage.setItem('user', JSON.stringify(userData));
                                    showMessage('loginSuccess', '✅ تم تسجيل الدخول بحساب Google!');
                                    
                                    setTimeout(() => {
                                        window.location.href = 'index.html';
                                    }, 800);
                                }
                            });
                            
                            if (!userFound) {
                                showMessage('loginError', '❌ لا يوجد حساب مرتبط ببريد Google هذا، يرجى إنشاء حساب جديد');
                            }
                        } else {
                            showMessage('loginError', '❌ لا يوجد حساب مرتبط ببريد Google هذا، يرجى إنشاء حساب جديد');
                        }
                    })
                    .catch((error) => {
                        showMessage('loginError', '❌ خطأ: ' + error.message);
                    });
            }, 1000);
        }

        // إنشاء حساب جديد
        function handleRegister() {
            const firstName = document.getElementById('regFirstName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const city = document.getElementById('regCity').value.trim();
            const district = document.getElementById('regDistrict').value.trim();
            const address = document.getElementById('regAddress').value.trim();
            const birthdate = document.getElementById('regBirthdate').value;
            const gender = document.getElementById('regGender').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            hideAllMessages();
            
            if (!firstName || !lastName || !email || !phone || !city || !district || !address || !birthdate || !gender) {
                showMessage('registerError', 'يرجى ملء جميع الحقول المطلوبة');
                return;
            }
            
            if (password.length < 6) {
                showMessage('registerError', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('registerError', 'كلمة المرور غير متطابقة');
                return;
            }
            
            // التحقق من صحة رقم الجوال
            if (!phone.match(/^05\d{8}$|^9665\d{8}$/)) {
                showMessage('registerError', 'رقم الجوال غير صحيح (يجب أن يبدأ بـ 05)');
                return;
            }

            document.getElementById('registerLoading').classList.add('show');

            database.ref('users').orderByChild('email').equalTo(email).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        document.getElementById('registerLoading').classList.remove('show');
                        showMessage('registerError', 'البريد الإلكتروني مسجل بالفعل');
                        return;
                    }
                    
                    const newUser = {
                        firstName: firstName,
                        lastName: lastName,
                        email: email,
                        phone: phone,
                        city: city,
                        district: district,
                        address: address,
                        birthdate: birthdate,
                        gender: gender,
                        password: password,
                        role: 'customer',
                        provider: 'email',
                        createdAt: Date.now(),
                        lastLogin: Date.now()
                    };
                    
                    database.ref('users').push(newUser)
                        .then((ref) => {
                            document.getElementById('registerLoading').classList.remove('show');
                            
                            const userData = {
                                id: ref.key,
                                email: email,
                                firstName: firstName,
                                lastName: lastName,
                                fullName: `${firstName} ${lastName}`,
                                role: 'customer',
                                phone: phone,
                                city: city,
                                district: district,
                                address: address
                            };
                            
                            localStorage.setItem('user', JSON.stringify(userData));
                            showMessage('registerSuccess', '✅ تم إنشاء الحساب بنجاح!');
                            
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 1000);
                        })
                        .catch((error) => {
                            document.getElementById('registerLoading').classList.remove('show');
                            showMessage('registerError', 'خطأ: ' + error.message);
                        });
                })
                .catch((error) => {
                    document.getElementById('registerLoading').classList.remove('show');
                    showMessage('registerError', 'خطأ في الاتصال: ' + error.message);
                });
        }

        // إنشاء حساب بـ Google
        function handleGoogleRegister() {
            hideAllMessages();
            document.getElementById('registerLoading').classList.add('show');
            
            setTimeout(() => {
                const googleEmail = prompt('📧 أدخل بريدك الإلكتروني في Google:', 'user@gmail.com');
                if (!googleEmail) {
                    document.getElementById('registerLoading').classList.remove('show');
                    return;
                }
                
                const googleFirstName = prompt('👤 أدخل اسمك الأول:', 'أحمد');
                const googleLastName = prompt('👤 أدخل اسمك الأخير:', 'محمد');
                const googlePhone = prompt('📱 أدخل رقم جوالك:', '05xxxxxxxx');
                
                if (!googleFirstName || !googleLastName) {
                    document.getElementById('registerLoading').classList.remove('show');
                    showMessage('registerError', 'يرجى إدخال الاسم');
                    return;
                }
                
                database.ref('users').orderByChild('email').equalTo(googleEmail).once('value')
                    .then((snapshot) => {
                        if (snapshot.exists()) {
                            document.getElementById('registerLoading').classList.remove('show');
                            showMessage('registerError', 'البريد الإلكتروني مسجل بالفعل، يرجى تسجيل الدخول');
                            return;
                        }
                        
                        const newUser = {
                            firstName: googleFirstName,
                            lastName: googleLastName,
                            email: googleEmail,
                            phone: googlePhone || '',
                            city: '',
                            district: '',
                            address: '',
                            birthdate: '',
                            gender: '',
                            password: '',
                            role: 'customer',
                            provider: 'google',
                            createdAt: Date.now(),
                            lastLogin: Date.now()
                        };
                        
                        database.ref('users').push(newUser)
                            .then((ref) => {
                                document.getElementById('registerLoading').classList.remove('show');
                                
                                const userData = {
                                    id: ref.key,
                                    email: googleEmail,
                                    firstName: googleFirstName,
                                    lastName: googleLastName,
                                    fullName: `${googleFirstName} ${googleLastName}`,
                                    role: 'customer',
                                    phone: googlePhone || '',
                                    provider: 'google'
                                };
                                
                                localStorage.setItem('user', JSON.stringify(userData));
                                showMessage('registerSuccess', '✅ تم إنشاء الحساب بـ Google بنجاح!');
                                
                                setTimeout(() => {
                                    window.location.href = 'index.html';
                                }, 1000);
                            })
                            .catch((error) => {
                                document.getElementById('registerLoading').classList.remove('show');
                                showMessage('registerError', 'خطأ: ' + error.message);
                            });
                    })
                    .catch((error) => {
                        document.getElementById('registerLoading').classList.remove('show');
                        showMessage('registerError', 'خطأ: ' + error.message);
                    });
            }, 500);
        }

        // التحقق من وجود جلسة سابقة
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.role === 'admin') {
                window.location.href = 'admin.html';
            }
            
            // تعبئة تاريخ الميلاد كحد أقصى
            const birthdateInput = document.getElementById('regBirthdate');
            if (birthdateInput) {
                const today = new Date();
                const maxDate = new Date(today.getFullYear() - 10, today.getMonth(), today.getDate());
                birthdateInput.max = maxDate.toISOString().split('T')[0];
            }
        });
    </script>
</body>
</html>
