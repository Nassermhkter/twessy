<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Healtha</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --bg: #F8FAFC;
            --bg-white: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --danger: #EF4444;
            --success: #27ae60;
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: 0.3s;
            --font: 'Tajawal', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #CCFBF1, #E0F2FE);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--text-secondary);
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: white;
            cursor: pointer;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .message {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-top: 15px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
        }

        .message.success {
            background: #D1FAE5;
            color: #065F46;
        }

        .message.info {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .info-box {
            background: #FEF3C7;
            padding: 15px;
            border-radius: var(--radius-sm);
            margin-top: 20px;
            font-size: 13px;
            border-right: 4px solid #F59E0B;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
        }

        .info-box p {
            margin: 3px 0;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 10px;
            color: var(--primary);
        }

        .loading-spinner.show {
            display: block;
        }

        .loading-spinner i {
            animation: spin 1s linear infinite;
            font-size: 24px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🏥 Healtha</h1>
                <p>تسجيل الدخول إلى المتجر</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
            </div>

            <!-- Login Panel -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" placeholder="admin@healtha.com" value="admin@healtha.com" required>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" value="admin123" required>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                    </button>
                </form>
                <div class="loading-spinner" id="loginLoading">
                    <i class="fas fa-circle-notch"></i> جاري تسجيل الدخول...
                </div>
                <div class="message error" id="loginError"></div>
                <div class="message success" id="loginSuccess"></div>
                <div class="message info" id="loginInfo" style="display: block; background: #FEF3C7; color: #92400E;">
                    ⚠️ <strong>مهم:</strong> إذا لم يعمل تسجيل الدخول، افتح ملف <strong>setup-admin.html</strong> أولاً لتهيئة حساب المدير، أو غير صلاحيات Firebase Rules إلى:
                    <br><code style="background: #fff; padding: 5px; display: block; margin-top: 5px; direction: ltr;">{ "rules": { ".read": true, ".write": true } }</code>
                </div>
            </div>

            <!-- Register Panel -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="regName" placeholder="أدخل اسمك" required>
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="regEmail" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="regPassword" placeholder="6 أحرف على الأقل" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>تأكيد كلمة المرور</label>
                        <input type="password" id="regConfirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="handleRegister()">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                </form>
                <div class="loading-spinner" id="registerLoading">
                    <i class="fas fa-circle-notch"></i> جاري إنشاء الحساب...
                </div>
                <div class="message error" id="registerError"></div>
                <div class="message success" id="registerSuccess"></div>
            </div>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            databaseURL: "https://medical-54ab4-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
            hideAllMessages();
            
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }

        function hideAllMessages() {
            ['loginError', 'loginSuccess', 'registerError', 'registerSuccess'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
            document.getElementById('loginLoading').classList.remove('show');
            document.getElementById('registerLoading').classList.remove('show');
        }

        function showMessage(id, text) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.style.display = 'block';
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            hideAllMessages();
            
            if (!email || !password) {
                showMessage('loginError', 'يرجى إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            document.getElementById('loginLoading').classList.add('show');

            database.ref('users').orderByChild('email').equalTo(email).once('value')
                .then((snapshot) => {
                    document.getElementById('loginLoading').classList.remove('show');
                    
                    if (snapshot.exists()) {
                        let loggedIn = false;
                        
                        snapshot.forEach((childSnapshot) => {
                            const user = childSnapshot.val();
                            
                            if (user.password === password) {
                                loggedIn = true;
                                
                                const userData = {
                                    id: childSnapshot.key,
                                    email: user.email,
                                    name: user.name,
                                    role: user.role || 'customer',
                                    phone: user.phone || ''
                                };
                                
                                localStorage.setItem('user', JSON.stringify(userData));
                                showMessage('loginSuccess', '✅ تم تسجيل الدخول بنجاح!');
                                
                                // تحديث آخر دخول
                                database.ref(`users/${childSnapshot.key}/lastLogin`).set(Date.now())
                                    .catch(() => {}); // تجاهل الخطأ إذا فشل التحديث
                                
                                setTimeout(() => {
                                    if (userData.role === 'admin') {
                                        window.location.href = 'admin.html';
                                    } else {
                                        window.location.href = 'index.html';
                                    }
                                }, 800);
                            }
                        });
                        
                        if (!loggedIn) {
                            showMessage('loginError', '❌ كلمة المرور غير صحيحة');
                        }
                    } else {
                        showMessage('loginError', '❌ البريد الإلكتروني غير مسجل');
                    }
                })
                .catch((error) => {
                    document.getElementById('loginLoading').classList.remove('show');
                    console.error('Firebase error:', error);
                    
                    if (error.code === 'PERMISSION_DENIED') {
                        showMessage('loginError', '❌ صلاحيات قاعدة البيانات مرفوضة. يجب تغيير Firebase Rules إلى:\n{ "rules": { ".read": true, ".write": true } }');
                    } else {
                        showMessage('loginError', '❌ خطأ في الاتصال: ' + error.message);
                    }
                });
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            hideAllMessages();
            
            if (!name || !email || !password) {
                showMessage('registerError', 'يرجى ملء جميع الحقول المطلوبة');
                return;
            }
            
            if (password.length < 6) {
                showMessage('registerError', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('registerError', 'كلمة المرور غير متطابقة');
                return;
            }

            document.getElementById('registerLoading').classList.add('show');

            database.ref('users').orderByChild('email').equalTo(email).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        document.getElementById('registerLoading').classList.remove('show');
                        showMessage('registerError', 'البريد الإلكتروني مسجل بالفعل');
                        return;
                    }
                    
                    const newUser = {
                        name: name,
                        email: email,
                        password: password,
                        role: 'customer',
                        createdAt: Date.now(),
                        lastLogin: Date.now()
                    };
                    
                    database.ref('users').push(newUser)
                        .then((ref) => {
                            document.getElementById('registerLoading').classList.remove('show');
                            
                            const userData = {
                                id: ref.key,
                                email: email,
                                name: name,
                                role: 'customer'
                            };
                            
                            localStorage.setItem('user', JSON.stringify(userData));
                            showMessage('registerSuccess', '✅ تم إنشاء الحساب بنجاح!');
                            
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 800);
                        })
                        .catch((error) => {
                            document.getElementById('registerLoading').classList.remove('show');
                            showMessage('registerError', 'خطأ: ' + error.message);
                        });
                })
                .catch((error) => {
                    document.getElementById('registerLoading').classList.remove('show');
                    showMessage('registerError', 'خطأ في الاتصال: ' + error.message);
                });
        }

        // التحقق من وجود جلسة سابقة
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.role === 'admin') {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
