<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

            databaseURL: "https://medical-54ab4-default-rtdb.firebaseio.com/"

        firebase.initializeApp(firebaseConfig);

        async function initializeData() {
            try {
            
                await database.ref('categories').set(categories);

                const settings = {
                    storeName: "Healtha",

                    phone: "966555555555",

                    address: "الرياض، المملكة العربية السعودية - حي الملقا - طريق الملك فهد",
                    currency: "SAR"

                await database.ref('settings').set(settings);

                    <h2 style="color: green;">✅ تمت تهيئة جميع البيانات بنجاح!</h2>
                    <div style="margin: 20px 0; padding: 20px; background: #f0f9ff; border-radius: 10px;">
                        <h3>معلومات تسجيل الدخول للوحة التحكم:</h3>
                        <p>📧 البريد: admin@healtha.com</p>
                        <p>🔑 كلمة المرور: admin123</p>
                    </div>
                    <h3>الصفحات المتاحة:</h3>
                    <ul>

                        <li><a href="categories.html">🏷️ الفئات</a></li>

                    </ul>
                    <p style="margin-top: 20px;"><strong>كود خصم للتجربة:</strong> HEALTHA2024 (خصم 10%)</p>
                `;
            } catch (error) {
                document.getElementById('status').innerHTML = `<h2 style="color: red;">❌ حدث خطأ: ${error.message}</h2>`;
            }
        }

        initializeData();
    </script>
</body>
